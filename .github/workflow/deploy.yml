name: butadon-app

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t butadon-app .

# 1. คุณ git push โค้ดไปที่ main
# 2. GitHub ตรวจพบ push
# 3. GitHub Actions เริ่ม workflow อัตโนมัติ
# 4. สร้าง Linux machine ใหม่ (runner)
# 5. ดาวน์โหลดโค้ดจาก repo
# 6. รัน docker build เพื่อสร้าง image
# 7. ถ้าทุกอย่างสำเร็จ → pipeline ผ่าน (green check)